services:
  - type: web
    name: fms-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run prisma:generate && npm run build
    startCommand: npm run prisma:migrate:deploy && npm run start
    healthCheckPath: /health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN_DAYS
        value: 30
      - key: CORS_ORIGIN
        sync: false
      - key: BCRYPT_SALT_ROUNDS
        value: 12
      - key: LOG_LEVEL
        value: info
