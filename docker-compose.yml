version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fms_user
      POSTGRES_PASSWORD: fms_password
      POSTGRES_DB: fms_db
    ports:
      - "5432:5432"
    volumes:
      - fms_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fms_user -d fms_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fms_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fms.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  fms_postgres_data:
